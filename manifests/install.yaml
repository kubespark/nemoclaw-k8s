---
apiVersion: v1
kind: Namespace
metadata:
  name: nemoclaw
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nemoclaw
  namespace: nemoclaw
  labels:
    app.kubernetes.io/name: nemoclaw
---
apiVersion: v1
kind: Secret
metadata:
  name: nemoclaw
  namespace: nemoclaw
  labels:
    app.kubernetes.io/name: nemoclaw
type: Opaque
stringData:
  # Replace with your NVIDIA API key from build.nvidia.com
  NVIDIA_API_KEY: "REPLACE_ME"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemoclaw
  namespace: nemoclaw
  labels:
    app.kubernetes.io/name: nemoclaw
data:
  NEMOCLAW_INFERENCE_PROVIDER: "nvidia-nim"
  NEMOCLAW_MODEL: "nemotron-3-super-120b"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nemoclaw
  namespace: nemoclaw
  labels:
    app.kubernetes.io/name: nemoclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nemoclaw
  namespace: nemoclaw
  labels:
    app.kubernetes.io/name: nemoclaw
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: nemoclaw
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemoclaw
  namespace: nemoclaw
  labels:
    app.kubernetes.io/name: nemoclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nemoclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nemoclaw
    spec:
      serviceAccountName: nemoclaw
      containers:
        - name: nemoclaw
          image: ghcr.io/nvidia/openshell-community/sandboxes/openclaw:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nemoclaw
          env:
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nemoclaw
                  key: NVIDIA_API_KEY
          volumeMounts:
            - name: data
              mountPath: /sandbox
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nemoclaw
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nemoclaw
  namespace: nemoclaw
  labels:
    app.kubernetes.io/name: nemoclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nemoclaw
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
