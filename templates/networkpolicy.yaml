{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nemoclaw.fullname" . }}
  labels:
    {{- include "nemoclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nemoclaw.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to configured CIDRs (inference API, etc.)
    {{- range .Values.networkPolicy.egressCIDRs }}
    - to:
        - ipBlock:
            cidr: {{ . }}
      ports:
        - port: 443
          protocol: TCP
    {{- end }}
{{- end }}
